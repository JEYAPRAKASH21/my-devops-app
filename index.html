<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Colorful Webpage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7eb3, #65d6ce, #ffd166);
            color: #333;
        }

        header {
            text-align: center;
            padding: 40px;
            color: white;
            background: rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 3em;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: auto;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        .card-content h2 {
            margin: 10px 0;
            color: #ff7eb3;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 25px;
            background: linear-gradient(45deg, #ff7eb3, #65d6ce);
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            opacity: 0.8;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1> Colorful Web Design</h1>
    <p>Simple, modern, and beautiful HTML page</p>
</header>

<div class="container">
    <div class="card">
        <img src="https://picsum.photos/400/250" alt="Random Image">
        <div class="card-content">
            <h2>Awesome Design</h2>
            <p>This is a colorful card with a smooth hover effect and a random image.</p>
            <a href="#" class="btn">Explore</a>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Your Website</p>
</footer>

</body>
</html>
